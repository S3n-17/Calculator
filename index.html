<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header id="header">CALCULATOR</header>
    <div id="screen"><input type="text" value="" id="input"></input></div>
    <div id="calculator">
        <div id="line1">
            <button class="operator" id="History">History</button>
            <!-- <button class="operator" id="factorial">x!</button> -->
            <button class="operator" id="open_bracket">(</button>
            <button class="operator" id="close_bracket">)</button>
            <!-- <button class="operator" id="percentage">%</button> -->
            <button class="operator" id="AC/CE">AC</button>
        </div>
        <!-- <div id="functions">
            <button class="functions" id="sin">sin</button>
            <button class="functions" id="cos">cos</button>
            <button class="functions" id="tan">tan</button>
            <button class="functions" id="log">log</button>
            <button class="functions" id="ln">ln</button>
        </div> -->
        <div id="nextline">
            <div id="numbers">
                <div id="n1" class="nrow">
                    <button class="number" id="7" value="7">7</button>
                    <button class="number" id="8" value="8">8</button>
                    <button class="number" id="9" value="9">9</button>
                </div>
                <div id="n2" class="nrow">
                    <button class="number" id="4" value="4">4</button>
                    <button class="number" id="5" value="5">5</button>
                    <button class="number" id="6" value="6">6</button>
                </div>
                <div id="n3" class="nrow">
                    <button class="number" id="1" value="1">1</button>
                    <button class="number" id="2" value="2">2</button>
                    <button class="number" id="3" value="3">3</button>
                </div>
                <div id="n4" class="nrow">
                    <button class="number" id="0" value="0">0</button>
                    <button class="number" id="decimal" value=".">.</button>
                    <button class="number" id="equals" value="=">=</button>
                </div>
            </div>
            <div id="operations">
                <button class="calc_operator" id="divide" value="/">/</button>
                <button class="calc_operator" id="multiply" value="*">*</button>
                <button class="calc_operator" id="subtract" value="-">-</button>
                <button class="calc_operator" id="add" value="+">+</button>
            </div>
        </div>



    </div>
    <script src="js.js"></script>
</body>

</html>
